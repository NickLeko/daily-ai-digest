name: Daily AI Digest

on:
  schedule:
    - cron: '0 14 * * *'
    - cron: '0 15 * * *'
  workflow_dispatch:

concurrency:
  group: daily-ai-digest
  cancel-in-progress: false

jobs:
  run-digest:
    runs-on: ubuntu-latest
    env:
      LOCAL_TIMEZONE: America/Los_Angeles
      STATE_FILE_PATH: data/state/digest_state.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Restore digest state cache
        id: state-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: data/state
          key: digest-state-${{ github.run_id }}
          restore-keys: |
            digest-state-

      - name: Check Pacific schedule window
        id: gate
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import datetime
          from pathlib import Path
          from zoneinfo import ZoneInfo

          local_timezone = os.getenv("LOCAL_TIMEZONE", "America/Los_Angeles")
          state_path = Path(os.getenv("STATE_FILE_PATH", "data/state/digest_state.json"))
          pacific_now = datetime.now(ZoneInfo(local_timezone))
          local_date = pacific_now.date().isoformat()
          within_window = 7 <= pacific_now.hour < 10

          last_sent_date = ""
          if state_path.exists():
              try:
                  with state_path.open("r", encoding="utf-8") as f:
                      data = json.load(f)
                  last_sent_date = str((data or {}).get("last_sent_date", "") or "")
              except Exception:
                  last_sent_date = ""

          already_sent_today = last_sent_date == local_date
          should_run = within_window and not already_sent_today

          print(f"Pacific time now: {pacific_now.isoformat()}")
          print(f"Within 7:00-10:00 window: {within_window}")
          print(f"Last sent local date: {last_sent_date or '(none)'}")
          print(f"Already sent today: {already_sent_today}")
          print(f"Proceed with digest: {should_run}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              print(f"should_run={'true' if should_run else 'false'}", file=f)
          PY

      - name: Stop early when outside Pacific morning window or already sent today
        if: ${{ steps.gate.outputs.should_run != 'true' }}
        run: |
          echo "Skipping run because Pacific time is outside the 7:00-10:00 AM window or today's digest was already sent."
          exit 0

      - name: Install dependencies
        if: ${{ steps.gate.outputs.should_run == 'true' }}
        run: pip install -r requirements.txt

      - name: Run script
        if: ${{ steps.gate.outputs.should_run == 'true' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python main.py

      - name: Save digest state cache
        if: ${{ steps.gate.outputs.should_run == 'true' }}
        uses: actions/cache/save@v4
        with:
          path: data/state
          key: digest-state-${{ github.run_id }}
